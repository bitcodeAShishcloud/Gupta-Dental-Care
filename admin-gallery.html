<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Gallery Upload - Gupta Dental Care</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #eef7ff 0%, #ffffff 50%, #fef3c7 100%);
            color: #0f172a;
            padding: 24px 12px;
        }

        .wrap {
            max-width: 1000px;
            margin: 0 auto;
        }

        .card-shell {
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 16px 36px rgba(15, 23, 42, 0.1);
            background: #ffffff;
            margin-bottom: 24px;
        }

        .top {
            background: linear-gradient(120deg, #0f766e 0%, #0ea5a3 60%, #f59e0b 100%);
            color: #ffffff;
            padding: 20px 22px;
        }

        .body {
            padding: 22px;
        }

        .tiny {
            color: #475569;
            font-size: 0.9rem;
        }

        .danger {
            color: #dc2626;
            font-weight: 700;
        }

        .gallery-item {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            gap: 16px;
            align-items: flex-start;
            background: #f8fafc;
        }

        .gallery-img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
            flex-shrink: 0;
        }

        .gallery-info {
            flex-grow: 1;
        }

        .gallery-title {
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 1rem;
        }

        .gallery-caption {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .gallery-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .badge-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge-active {
            background: #d1fae5;
            color: #065f46;
        }

        .badge-inactive {
            background: #fee2e2;
            color: #991b1b;
        }

        .toggle-btn {
            padding: 6px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .toggle-btn-active {
            background: #e5e7eb;
            color: #374151;
        }

        .toggle-btn-active:hover {
            background: #d1d5db;
        }

        .toggle-btn-inactive {
            background: #10b981;
            color: white;
        }

        .toggle-btn-inactive:hover {
            background: #059669;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #64748b;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin: 24px 0 16px 0;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 12px;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="card-shell">
            <div class="top">
                <h3 class="mb-1">Gallery Management</h3>
                <p class="mb-0">Upload photos to Google Drive and manage your gallery.</p>
            </div>

            <div class="body">
                <div class="alert alert-warning" role="alert">
                    <i class="fas fa-lock"></i> Keep this page private. Do not link it from your public website.
                </div>

                <h5 class="section-title"><i class="fas fa-cloud-upload-alt"></i> Upload New Photo</h5>

                <form id="galleryUploadForm" novalidate>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label" for="title">Photo Title <span class="danger">*</span></label>
                            <input type="text" class="form-control" id="title" name="title" 
                                placeholder="Example: Smile Makeover Case" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label" for="photo">Photo File <span class="danger">*</span></label>
                            <input type="file" class="form-control" id="photo" accept="image/*" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label" for="caption">Caption (Optional)</label>
                            <input type="text" class="form-control" id="caption" name="caption"
                                placeholder="Add a short description...">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label" for="order">Display Order</label>
                            <input type="number" class="form-control" id="order" name="order" min="1" value="1">
                        </div>
                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-upload"></i> Upload Photo
                        </button>
                        <button type="reset" class="btn btn-outline-secondary">Reset</button>
                    </div>
                </form>

                <div id="result" class="mt-3"></div>

                <h5 class="section-title"><i class="fas fa-images"></i> Your Photos</h5>

                <div id="galleryContainer" class="loading">
                    <i class="fas fa-spinner fa-spin"></i> Loading photos...
                </div>
            </div>
        </div>
    </div>

    <script>
        // Hardcoded credentials
        const SPREADSHEET_ID = "1Obd3XRC-FDH2iiaSma_5x-ip--NQ_RdS9wT31NmHNTM";
        const ADMIN_TOKEN = "ai_saas_admin_2026_94kfj39fj3f9j3f";
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwV1uFw0k6CeqnCSaWO8IPHStth92B7uNbfc8FbxZ4arnQTOD8SdXcxKhFyRigWNdLU/exec";
        // Gallery sheet CSV export - MUST publish Gallery tab specifically as CSV
        const GALLERY_CSV_URL = "https://docs.google.com/spreadsheets/d/1Obd3XRC-FDH2iiaSma_5x-ip--NQ_RdS9wT31NmHNTM/gviz/tq?tqx=out:csv&sheet=Gallery";

        const form = document.getElementById('galleryUploadForm');
        const result = document.getElementById('result');
        const galleryContainer = document.getElementById('galleryContainer');

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    const dataUrl = String(reader.result || '');
                    const base64 = dataUrl.includes(',') ? dataUrl.split(',')[1] : '';
                    resolve(base64);
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function normalizeDriveUrl_(url) {
            if (!url) return '';
            if (url.includes('/file/d/')) {
                const match = url.match(/\/file\/d\/([^/]+)/);
                if (match) return 'https://drive.google.com/thumbnail?id=' + match[1];
            }
            if (url.includes('/uc?id=')) {
                const match = url.match(/id=([^&]+)/);
                if (match) return 'https://drive.google.com/thumbnail?id=' + match[1];
            }
            if (url.match(/^[a-zA-Z0-9_-]+$/)) {
                return 'https://drive.google.com/thumbnail?id=' + url;
            }
            return url;
        }

        function parseCSV_(text) {
            const rows = [];
            let current = [];
            let inQuotes = false;
            let value = '';

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];

                if (char === '"') {
                    if (inQuotes && nextChar === '"') {
                        value += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    current.push(value.trim());
                    value = '';
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (value.trim() || current.length > 0) {
                        current.push(value.trim());
                        if (current.some(v => v.length > 0)) {
                            rows.push(current);
                        }
                        current = [];
                        value = '';
                    }
                    if (char === '\r' && nextChar === '\n') i++;
                } else {
                    value += char;
                }
            }

            if (value.trim() || current.length > 0) {
                current.push(value.trim());
                if (current.some(v => v.length > 0)) {
                    rows.push(current);
                }
            }

            return rows;
        }

        function postToAppsScript_(fields) {
            return new Promise((resolve) => {
                const iframeId = 'appsScriptPostTarget';
                let iframe = document.getElementById(iframeId);

                if (!iframe) {
                    iframe = document.createElement('iframe');
                    iframe.id = iframeId;
                    iframe.name = iframeId;
                    iframe.style.display = 'none';
                    document.body.appendChild(iframe);
                }

                const tempForm = document.createElement('form');
                tempForm.method = 'POST';
                tempForm.action = APPS_SCRIPT_URL;
                tempForm.target = iframeId;
                tempForm.style.display = 'none';

                Object.entries(fields).forEach(([key, val]) => {
                    const input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = key;
                    input.value = String(val ?? '');
                    tempForm.appendChild(input);
                });

                document.body.appendChild(tempForm);
                tempForm.submit();

                setTimeout(() => {
                    tempForm.remove();
                    resolve();
                }, 1800);
            });
        }

        async function loadGallery() {
            try {
                const response = await fetch(GALLERY_CSV_URL);
                const text = await response.text();
                const rows = parseCSV_(text);

                if (rows.length < 2) {
                    galleryContainer.innerHTML = '<p class="text-muted">No photos uploaded yet.</p>';
                    return;
                }

                const headers = rows[0].map(h => h.toLowerCase().trim());
                const activeIdx = headers.indexOf('active');
                const titleIdx = headers.indexOf('title');
                const captionIdx = headers.indexOf('caption');
                const imageUrlIdx = headers.indexOf('imageurl');

                if (activeIdx === -1 || titleIdx === -1 || imageUrlIdx === -1) {
                    galleryContainer.innerHTML = `<p class="text-danger"><i class="fas fa-exclamation-circle"></i> CSV format error. Found headers: ${rows[0].join(', ')}</p>`;
                    return;
                }

                const photos = rows.slice(1)
                    .filter(row => row[activeIdx]?.toUpperCase() === 'TRUE')
                    .map((row, idx) => ({
                        index: idx + 2,
                        active: row[activeIdx]?.toUpperCase() === 'TRUE',
                        title: row[titleIdx] || 'Untitled',
                        caption: row[captionIdx] || '',
                        imageUrl: normalizeDriveUrl_(row[imageUrlIdx] || '')
                    }));

                if (photos.length === 0) {
                    galleryContainer.innerHTML = '<p class="text-muted">No active photos. Check Gallery sheet.</p>';
                    return;
                }

                galleryContainer.innerHTML = photos.map(photo => `
                    <div class="gallery-item">
                        <img src="${photo.imageUrl}" alt="${photo.title}" class="gallery-img" 
                            onerror="this.src='https://via.placeholder.com/100?text=No+Image'">
                        <div class="gallery-info">
                            <div class="gallery-title">${escapeHtml(photo.title)}</div>
                            ${photo.caption ? `<div class="gallery-caption">${escapeHtml(photo.caption)}</div>` : ''}
                            <div class="gallery-actions">
                                <span class="badge-status ${photo.active ? 'badge-active' : 'badge-inactive'}">
                                    ${photo.active ? '<i class="fas fa-check"></i> Active' : '<i class="fas fa-ban"></i> Inactive'}
                                </span>
                                <button type="button" class="toggle-btn toggle-btn-${photo.active ? 'active' : 'inactive'}" 
                                    onclick="togglePhotoStatus(${photo.index}, ${!photo.active})">
                                    ${photo.active ? 'Deactivate' : 'Activate'}
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                galleryContainer.innerHTML = `<p class="text-danger"><i class="fas fa-exclamation-circle"></i> Error loading photos: ${error.message}</p>`;
            }
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        async function togglePhotoStatus(rowIndex, newActive) {
            try {
                await postToAppsScript_({
                    action: 'updateGalleryStatus',
                    token: ADMIN_TOKEN,
                    rowIndex: rowIndex,
                    active: newActive ? 'TRUE' : 'FALSE'
                });

                setTimeout(() => {
                    loadGallery();
                }, 1500);
            } catch (error) {
                alert('Error updating photo status: ' + error.message);
            }
        }

        form.addEventListener('submit', async function (event) {
            event.preventDefault();

            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const title = document.getElementById('title').value.trim();
            const caption = document.getElementById('caption').value.trim();
            const order = document.getElementById('order').value.trim() || '1';
            const photoInput = document.getElementById('photo');
            const file = photoInput.files[0];

            if (!file) {
                result.innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-circle"></i> Please select an image file.</div>';
                return;
            }

            if (file.size > 4 * 1024 * 1024) {
                result.innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-circle"></i> Image must be smaller than 4 MB.</div>';
                return;
            }

            result.innerHTML = '<div class="alert alert-info"><i class="fas fa-spinner fa-spin"></i> Uploading image... please wait.</div>';

            try {
                const fileBase64 = await fileToBase64(file);

                await postToAppsScript_({
                    action: 'uploadGalleryPhoto',
                    token: ADMIN_TOKEN,
                    title,
                    caption,
                    order,
                    active: 'TRUE',
                    fileName: file.name,
                    mimeType: file.type || 'image/jpeg',
                    fileBase64
                });

                result.innerHTML = '<div class="alert alert-success"><i class="fas fa-check-circle"></i> Photo uploaded! It will appear below in 5-15 seconds.</div>';
                form.reset();
                
                setTimeout(() => {
                    loadGallery();
                }, 2000);
            } catch (error) {
                result.innerHTML = `<div class="alert alert-danger"><i class="fas fa-exclamation-circle"></i> Upload failed: ${error.message}</div>`;
            }
        });

        // Load gallery on page load
        loadGallery();
        // Refresh every 30 seconds
        setInterval(loadGallery, 30000);
    </script>
</body>

</html>
