<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Offer Admin - Gupta Dental Care</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #f8fafc 55%, #fef3c7 100%);
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: #0f172a;
            padding: 24px 12px;
        }

        .admin-card {
            max-width: 780px;
            margin: 0 auto;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
            overflow: hidden;
        }

        .admin-header {
            padding: 18px 22px;
            background: linear-gradient(120deg, #0f766e 0%, #0ea5a3 55%, #f59e0b 100%);
            color: #ffffff;
        }

        .admin-body {
            padding: 22px;
        }

        .small-note {
            font-size: 0.9rem;
            color: #475569;
        }

        .required-mark {
            color: #dc2626;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="admin-card">
        <div class="admin-header">
            <h3 class="mb-1">Private Offer Admin</h3>
            <p class="mb-0">Submit offers directly to Google Sheet via Apps Script endpoint.</p>
        </div>

        <div class="admin-body">
            <div class="alert alert-warning" role="alert">
                Keep this page private. Do not link it publicly from your website.
            </div>

            <form id="offerForm" action="https://script.google.com/macros/s/AKfycbwzBrQ2aGzyHaa5cOcnMy0Hp0rz2TUzRtE4y6gxtb-T28jPao6JtTmzpPG6yFE0NdLK/exec" method="POST" novalidate>
                <input type="hidden" name="token" id="token" value="ai_saas_admin_2026_94kfj39fj3f9j3f">

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label" for="title">Title <span class="required-mark">*</span></label>
                        <input class="form-control" id="title" name="title" type="text" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" for="coupon">Coupon <span class="required-mark">*</span></label>
                        <input class="form-control" id="coupon" name="coupon" type="text" required>
                    </div>

                    <div class="col-md-12">
                        <label class="form-label" for="description">Description <span class="required-mark">*</span></label>
                        <textarea class="form-control" id="description" name="description" rows="3" required></textarea>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label" for="discount">Discount % <span class="required-mark">*</span></label>
                        <input class="form-control" id="discount" name="discount" type="number" min="1" max="100" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label" for="startDate">Start Date <span class="required-mark">*</span></label>
                        <input class="form-control" id="startDate" name="startDate" type="date" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label" for="endDate">End Date <span class="required-mark">*</span></label>
                        <input class="form-control" id="endDate" name="endDate" type="date" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label" for="badge">Badge</label>
                        <input class="form-control" id="badge" name="badge" type="text" value="Special">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label" for="icon">Icon Class</label>
                        <input class="form-control" id="icon" name="icon" type="text" value="fas fa-gift">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label" for="terms">Terms</label>
                        <input class="form-control" id="terms" name="terms" type="text" value="Limited time offer">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" for="active">Active</label>
                        <select class="form-select" id="active" name="active">
                            <option value="TRUE" selected>TRUE</option>
                            <option value="FALSE">FALSE</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" for="featured">Featured</label>
                        <select class="form-select" id="featured" name="featured">
                            <option value="FALSE" selected>FALSE</option>
                            <option value="TRUE">TRUE</option>
                        </select>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">Submit Offer</button>
                    <button type="reset" class="btn btn-outline-secondary">Reset</button>
                </div>

                <p class="small-note mt-3 mb-0">
                    Required Apps Script fields: token, active, title, description, discount, coupon, startDate, endDate, badge, icon, terms, featured.
                </p>
            </form>

            <div id="result" class="mt-3"></div>
        </div>
    </div>

    <script>
        const form = document.getElementById('offerForm');
        const result = document.getElementById('result');

        form.addEventListener('submit', async function(event) {
            event.preventDefault();

            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const actionUrl = form.getAttribute('action');
            if (!actionUrl || actionUrl.includes('PASTE_YOUR_APPS_SCRIPT_EXEC_URL')) {
                result.innerHTML = '<div class="alert alert-danger">Please set your Apps Script /exec URL in the form action.</div>';
                return;
            }

            const token = document.getElementById('token').value;
            if (!token || token.includes('PASTE_YOUR_ADMIN_TOKEN')) {
                result.innerHTML = '<div class="alert alert-danger">Please set your ADMIN_TOKEN in the hidden token field.</div>';
                return;
            }

            // Convert form data to URL-encoded string (Apps Script reads via e.parameter)
            const data = new FormData(form);
            const params = new URLSearchParams(data);

            result.innerHTML = '<div class="alert alert-info">Submitting...</div>';

            try {
                // Apps Script redirects POST cross-origin — must use no-cors mode.
                // With no-cors we cannot read the response body (opaque response),
                // so if no network error is thrown we treat it as success.
                await fetch(actionUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: params
                });

                result.innerHTML = '<div class="alert alert-success">Offer submitted. Please check your Google Sheet to confirm the row was added.</div>';
                form.reset();
            } catch (error) {
                result.innerHTML = `<div class="alert alert-danger">Network error — could not reach Apps Script endpoint. ${error.message}</div>`;
            }
        });
    </script>
</body>
</html>
