<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Gallery - Gupta Dental Care</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<style>
		:root {
			--brand-red: #c7161f;
			--brand-dark: #1f2937;
			--card-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
		}

		body {
			margin: 0;
			font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
			background: linear-gradient(160deg, #f3f4f6 0%, #ffffff 45%, #eef6ff 100%);
			color: #111827;
			min-height: 100vh;
		}

		.topbar {
			background: #ffffff;
			border-bottom: 1px solid #e5e7eb;
			position: sticky;
			top: 0;
			z-index: 1000;
		}

		.brand-title {
			color: var(--brand-red);
			font-weight: 700;
			letter-spacing: 0.02em;
		}

		.hero {
			padding: 2.5rem 0 1.5rem;
		}

		.hero h1 {
			font-size: clamp(1.6rem, 2.6vw, 2.4rem);
			font-weight: 800;
			color: var(--brand-dark);
			margin-bottom: 0.5rem;
		}

		.hero p {
			color: #4b5563;
			margin-bottom: 0;
		}

		.gallery-grid {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
			gap: 16px;
			padding-bottom: 2.5rem;
		}

		.gallery-card {
			background: #ffffff;
			border-radius: 14px;
			overflow: hidden;
			box-shadow: var(--card-shadow);
			border: 1px solid #e5e7eb;
			transition: transform 0.22s ease, box-shadow 0.22s ease;
		}

		.gallery-card:hover {
			transform: translateY(-4px);
			box-shadow: 0 14px 30px rgba(0, 0, 0, 0.16);
		}

		.gallery-card img {
			width: 100%;
			height: 230px;
			object-fit: cover;
			display: block;
			background: #f3f4f6;
		}

		.img-caption {
			padding: 0.65rem 0.8rem;
			font-size: 0.9rem;
			color: #374151;
			border-top: 1px solid #f3f4f6;
		}
	</style>
</head>
<body>
	<header class="topbar py-2">
		<div class="container d-flex justify-content-between align-items-center">
			<div class="brand-title">
				<i class="fas fa-tooth me-2"></i>Gupta Dental Care Gallery
			</div>
			<a href="index.html" class="btn btn-outline-danger btn-sm">
				<i class="fas fa-arrow-left me-1"></i>Back to Home
			</a>
		</div>
	</header>

	<main class="container">
		<section class="hero text-center">
			<h1>Clinic Photo Gallery</h1>
			<p>All clinic images are displayed below in equal width and equal height.</p>
		</section>

		<section id="galleryGrid" class="gallery-grid"></section>
	</main>

	<script>
		// Published Google Sheet CSV for gallery rows.
		// Expected headers: active,title,caption,imageUrl,order
		const GALLERY_CSV_URL = "PASTE_YOUR_GALLERY_CSV_URL_HERE";

		const fallbackGalleryImages = [
			"Gallery/1_A.jpeg",
			"Gallery/2_A.jpeg",
			"Gallery/3_A.jpeg",
			"Gallery/4_A.jpeg",
			"Gallery/5_A.jpeg",
			"Gallery/6_A.jpeg",
			"Gallery/7_A.jpeg",
			"Gallery/8_A.jpeg",
			"Gallery/9_A.jpeg",
			"Gallery/10_A.jpeg",
			"Gallery/11_A.jpeg",
			"Gallery/12_A.jpeg",
			"Gallery/13_A.jpeg",
			"Gallery/14_A.jpeg",
			"Gallery/15_A.jpeg",
			"Gallery/16_A.jpeg",
			"Gallery/17_A.jpeg",
			"Gallery/18_A.jpeg"
		];

		const grid = document.getElementById("galleryGrid");

		function parseCSV(csvText) {
			const rows = [];
			let row = [];
			let cell = "";
			let inQuotes = false;

			for (let i = 0; i < csvText.length; i++) {
				const char = csvText[i];
				const next = csvText[i + 1];

				if (char === '"' && inQuotes && next === '"') {
					cell += '"';
					i++;
				} else if (char === '"') {
					inQuotes = !inQuotes;
				} else if (char === ',' && !inQuotes) {
					row.push(cell.trim());
					cell = "";
				} else if ((char === "\n" || char === "\r") && !inQuotes) {
					if (char === "\r" && next === "\n") {
						i++;
					}
					row.push(cell.trim());
					cell = "";
					if (row.length > 1 || row[0] !== "") {
						rows.push(row);
					}
					row = [];
				} else {
					cell += char;
				}
			}

			if (cell.length > 0 || row.length > 0) {
				row.push(cell.trim());
				rows.push(row);
			}

			return rows;
		}

		function normalizeDriveUrl(input) {
			const value = String(input || "").trim();
			if (!value) return "";

			if (value.includes("drive.google.com/file/d/")) {
				const parts = value.split("/d/");
				if (parts[1]) {
					const fileId = parts[1].split("/")[0];
					return `https://drive.google.com/thumbnail?id=${fileId}&sz=w1200`;
				}
			}

			if (value.includes("id=")) {
				const idPart = value.split("id=")[1].split("&")[0];
				if (idPart) {
					return `https://drive.google.com/thumbnail?id=${idPart}&sz=w1200`;
				}
			}

			return value;
		}

		function renderGalleryFromRows(rows) {
			const headers = rows[0].map(h => h.toLowerCase().trim());
			const items = rows.slice(1).map(columns => {
				const rowObj = {};
				headers.forEach((h, idx) => {
					rowObj[h] = (columns[idx] || "").trim();
				});

				return {
					active: String(rowObj.active || "").toUpperCase() === "TRUE",
					title: rowObj.title || "Clinic Photo",
					caption: rowObj.caption || rowObj.description || "",
					imageUrl: normalizeDriveUrl(rowObj.imageurl || rowObj.image || rowObj.photourl || rowObj.driveurl || ""),
					order: Number(rowObj.order || 9999)
				};
			}).filter(item => item.active && item.imageUrl);

			items.sort((a, b) => a.order - b.order);

			if (!items.length) {
				throw new Error("No active gallery rows found in CSV");
			}

			grid.innerHTML = "";
			items.forEach((item, index) => {
				const card = document.createElement("article");
				card.className = "gallery-card";
				card.innerHTML = `
					<img src="${item.imageUrl}" alt="${item.title || `Clinic photo ${index + 1}`}" loading="lazy">
					<div class="img-caption">${item.caption || item.title || `Clinic Photo ${index + 1}`}</div>
				`;
				grid.appendChild(card);
			});
		}

		function renderFallbackGallery() {
			grid.innerHTML = "";
			fallbackGalleryImages.forEach((imagePath, index) => {
				const card = document.createElement("article");
				card.className = "gallery-card";
				card.innerHTML = `
					<img src="${imagePath}" alt="Clinic photo ${index + 1}" loading="lazy">
					<div class="img-caption">Clinic Photo ${index + 1}</div>
				`;
				grid.appendChild(card);
			});
		}

		async function loadGallery() {
			if (!GALLERY_CSV_URL || GALLERY_CSV_URL === "PASTE_YOUR_GALLERY_CSV_URL_HERE") {
				renderFallbackGallery();
				return;
			}

			try {
				const response = await fetch(GALLERY_CSV_URL, { cache: "no-store" });
				if (!response.ok) {
					throw new Error(`Failed to load gallery CSV: ${response.status}`);
				}

				const csvText = await response.text();
				const rows = parseCSV(csvText);
				if (!rows.length) {
					throw new Error("Empty CSV");
				}

				renderGalleryFromRows(rows);
			} catch (error) {
				console.error("Gallery CSV load failed:", error);
				renderFallbackGallery();
			}
		}

		loadGallery();
	</script>
</body>
</html>
